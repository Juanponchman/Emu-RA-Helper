name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Describe the problem first — it helps to understand the need before the solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem / need
      description: What are you trying to do that's currently hard or impossible?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about (optional).
    validations:
      required: false

name: Bug report
description: Report a problem so it can be fixed
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can — specific reports get fixed faster.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact sequence that triggers the problem.
      placeholder: |
        1. Open the app
        2. Tap ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Shown on the home screen (e.g. v0.1.6).
    validations:
      required: true
  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: e.g. Android 13
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: Make and model
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: Logcat output if you can capture it (filter on the package name).
      render: text
    validations:
      required: false

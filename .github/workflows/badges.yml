# badges.yml
#
# Auto-maintains the `badges` branch, which holds two shields.io endpoint JSON
# files (badges/release.json and badges/downloads.json).
#
# WHY THIS EXISTS
# ───────────────
# The standard shields.io github/v/release and github/downloads badge types
# query the GitHub API through shields.io's shared token pool.  Under load that
# pool exhausts itself and badges render as "unable to select next github token
# from pool".  The endpoint badge type is different: shields.io simply fetches a
# static JSON file you control and renders whatever it says — it never touches
# the GitHub API at all, so it can never produce the token-pool error.
#
# HOW IT WORKS
# ────────────
# 1. This workflow runs on every release, on a daily schedule (to keep the
#    download count fresh), and on manual dispatch.
# 2. It uses the repo's own built-in GITHUB_TOKEN (never the shields.io pool)
#    to call the GitHub API via `gh`, computing the real values.
# 3. It writes two JSON files and publishes them to the `badges` branch via the
#    GitHub Contents API (not a local checkout/worktree of that branch). The
#    `badges` branch contains nothing else and is never merged into main — it
#    is pure generated infra.
#
# WHY THE CONTENTS API (and not git worktree)
# ───────────────────────────────────────────
# The earlier version checked out the badges branch into a git worktree. That
# broke on EVERY run because actions/checkout only fetches `main`, so
# `origin/badges` was never a local remote-tracking ref and the worktree command
# failed with "fatal: invalid reference: origin/badges" (exit 128) — silently
# freezing the badge for weeks. The Contents API needs no local ref at all: it
# reads the current blob SHA over HTTPS and PUTs the new content, creating the
# branch on first run. It cannot be tripped up by checkout depth or fetch config.
#
# BOOTSTRAP
# ─────────
# The `badges` branch is created automatically on the first workflow run (the
# first PUT with no prior SHA creates the file and the branch). Trigger a run with:
#   gh workflow run badges.yml
# …or via the Actions tab → "Update badge data" → "Run workflow".

name: Update badge data

on:
  release:
    types: [published]
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily — keeps download count current
  workflow_dispatch:       # manual trigger whenever needed

permissions:
  contents: write          # required to push to the badges branch

jobs:
  badges:
    name: Compute and publish badge JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (for .git context)
        uses: actions/checkout@v4

      - name: Compute badge values
        id: values
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ── Total downloads across all releases ──────────────────────────
          DOWNLOADS=$(gh api "repos/${{ github.repository }}/releases" \
            --paginate \
            --jq '[.[].assets[].download_count] | add // 0')

          # ── Latest release tag ───────────────────────────────────────────
          # Try the /releases/latest endpoint first; fall back to the list so
          # we still get a tag even when no non-prerelease release exists yet.
          TAG=$(gh api "repos/${{ github.repository }}/releases/latest" \
            --jq '.tag_name' 2>/dev/null || true)

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            TAG=$(gh api "repos/${{ github.repository }}/releases" \
              --jq 'first | .tag_name // "unreleased"')
          fi

          echo "downloads=$DOWNLOADS" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"

      - name: Write endpoint JSON files
        run: |
          mkdir -p out

          cat > out/downloads.json <<EOF
          {
            "schemaVersion": 1,
            "label": "downloads",
            "message": "${{ steps.values.outputs.downloads }}",
            "color": "brightgreen"
          }
          EOF

          cat > out/release.json <<EOF
          {
            "schemaVersion": 1,
            "label": "release",
            "message": "${{ steps.values.outputs.tag }}",
            "color": "blue"
          }
          EOF

      # Publish the two JSON files to the `badges` branch via the GitHub
      # Contents API directly — no local checkout of that branch, no worktree,
      # no remote-tracking ref required.  The previous git-worktree approach
      # broke because actions/checkout only fetches `main`, so `origin/badges`
      # was never a local ref and `git worktree add … origin/badges` died with
      # "invalid reference: origin/badges" on every run.  Going through the API
      # sidesteps all of that: it reads the current blob SHA (if any) and PUTs
      # the new content, creating the branch on first run.  It is idempotent and
      # cannot be tripped up by checkout depth or branch-fetch configuration.
      - name: Publish to badges branch via Contents API
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          publish() {
            local file="$1"          # path under the repo root on the badges branch
            local local_path="$2"    # the freshly-written JSON on disk
            local content
            content=$(base64 -w0 "$local_path")

            # Look up the existing blob SHA on the badges branch (empty if the
            # file — or the branch — does not exist yet; first run creates it).
            local sha
            sha=$(gh api "repos/$REPO/contents/$file?ref=badges" --jq '.sha' 2>/dev/null || true)

            # Skip the write when the content is byte-identical to avoid empty
            # commits on the daily cron when nothing changed.
            if [ -n "$sha" ]; then
              local current
              current=$(gh api "repos/$REPO/contents/$file?ref=badges" --jq '.content' 2>/dev/null | tr -d '\n' || true)
              local want
              want=$(base64 -w0 "$local_path")
              # GitHub returns base64 with newlines; normalise both sides.
              if [ "$(echo "$current" | base64 -d 2>/dev/null | base64 -w0)" = "$want" ]; then
                echo "$file unchanged — skipping."
                return 0
              fi
            fi

            local args=(-X PUT "repos/$REPO/contents/$file"
              -f "message=chore: update $file [skip ci]"
              -f "content=$content"
              -f "branch=badges")
            [ -n "$sha" ] && args+=(-f "sha=$sha")

            gh api "${args[@]}" --jq '.commit.sha' \
              | xargs -I{} echo "$file published in commit {}"
          }

          publish "downloads.json" "out/downloads.json"
          publish "release.json"   "out/release.json"
